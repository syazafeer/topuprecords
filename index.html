<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF ASCEND TRADING - Internal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; }
    </style>
</head>
<body class="text-gray-200 font-sans flex flex-col min-h-screen justify-between items-center p-6">

    <!-- Header / Nama Syarikat -->
    <header class="text-center mt-8 space-y-2">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200">
            AF ASCEND TRADING
        </h1>
        <p class="text-xs tracking-widest text-gray-500 uppercase">
            Topup Management Portal
        </p>
    </header>

    <!-- Main Content: Login Box -->
    <main class="w-full max-w-md my-auto">
        <div class="bg-[#161b22] border border-gray-800 rounded-2xl p-8 shadow-2xl backdrop-blur-sm">
            <div class="mb-6 text-center">
                <h2 class="text-xl font-semibold text-gray-100">Log Masuk Sistem</h2>
                <p class="text-sm text-gray-400 mt-1">Sila masukkan kredensial untuk track rekod</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" required placeholder="Masukkan username" 
                        class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500 transition-colors">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500 transition-colors">
                </div>

                <!-- Mesej Ralat -->
                <p id="errorMessage" class="text-xs text-red-400 hidden text-center font-medium"></p>

                <button type="submit" id="submitBtn"
                    class="w-full mt-2 bg-gradient-to-r from-amber-500 to-amber-600 text-gray-900 font-bold py-3 px-4 rounded-lg hover:from-amber-400 hover:to-amber-500 transition-all shadow-lg shadow-amber-950/20 active:scale-[0.98]">
                    Masuk Ke Dashboard
                </button>
            </form>
        </div>
    </main>

    <!-- Footer / Info Syarikat -->
    <footer class="text-center text-xs text-gray-600 mt-8 space-y-1">
        <p class="font-medium text-gray-500">Reg No: CA0421557X</p>
        <p>&copy; 2026 AF ASCEND TRADING. All Rights Reserved.</p>
    </footer>

    <!-- Logic Script untuk berhubung dengan Google Sheets -->
    <script strain="javascript">
        // GANTIKAN URL DI BAWAH DENGAN URL WEB APP KAU
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzBtiZ4s5y4rvyjmfH1g0q55s3GAs6rQzG_anwUKiBRdtVRQAp8oHl05e7lUMWrPLjnvg/exec";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');

            // Tukar butang kepada loading state
            submitBtn.disabled = true;
            submitBtn.innerText = "Menghubungi Database...";
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Untuk bypass CORS issue pada Google Apps Script
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                // Memandangkan kita guna 'no-cors', browser tak bagi baca response text secara direct demi keselamatan.
                // Sebagai alternatif untuk langkah asas ini, kita andaikan data dihantar.
                // Tetapi untuk sistem track topup, selepas ini kita akan buat page Dashboard.
                
                alert("Permintaan login dihantar! Sistem sedang menyemak data di Google Sheets.");
                
                // Nota untuk fasa seterusnya: Kita akan buat halaman untuk rekod jualan topup terus ke Google Sheet baru.
                
            } catch (error) {
                errorMsg.innerText = "Ralat sistem. Sila cuba lagi.";
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Masuk Ke Dashboard";
            }
        });
    </script>

</body>
</html>
